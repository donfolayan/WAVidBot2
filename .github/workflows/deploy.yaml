name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check . || true

      - name: Type check with mypy
        run: uv run mypy src/ --ignore-missing-imports || true

  build-and-push:
    name: Build and Push Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ github.sha }}

  deploy:
    name: Deploy to Oracle Cloud
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd ~/wabotii

            # Write env file from secret
            cat > .env << 'ENVEOF'
            ${{ secrets.ENV_FILE }}
            ENVEOF

            # Pull latest bot image (WAHA image is left untouched)
            docker compose pull wabotii

            # Restart only the bot, leave WAHA running
            docker compose up -d --no-deps wabotii

            # Quick health check
            sleep 5
            curl -f http://localhost:8000/health && echo "✅ Deployment complete!" || echo "⚠️ Health check failed, check logs"
