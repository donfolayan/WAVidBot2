# Standalone WAHA deployment (e.g. Oracle Cloud free tier)
# Copy this to your server along with a .env file containing WAHA settings.
#
# Usage:
#   docker compose -f docker-compose.waha.yml up -d
#
# After starting, set WAHA_BASE_URL in your bot's env to:
#   http://<server-ip>:3000

services:
  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    ports:
      - "3000:8000"
    environment:
      - WHATSAPP_DEFAULT_ENGINE=${WHATSAPP_DEFAULT_ENGINE:-NOWEB}
      - WAHA_CALLBACK_URL=${WAHA_CALLBACK_URL}
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD}
      - WHATSAPP_SWAGGER_USERNAME=${WHATSAPP_SWAGGER_USERNAME}
      - WHATSAPP_SWAGGER_PASSWORD=${WHATSAPP_SWAGGER_PASSWORD}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - waha-data:/app/sessions
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  waha-data:
