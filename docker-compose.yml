# Production: both WAHA and the bot on the same server.
# Bot image is pulled from Docker Hub (set DOCKERHUB_USERNAME and DOCKERHUB_REPO in .env).
# For local dev, override with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  wabotii:
    image: ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}:latest
    container_name: wabotii
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./downloads:/app/downloads
      - ./data:/app/data
    depends_on:
      - waha
    restart: unless-stopped

  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    ports:
      - "3000:8000"
    environment:
      - WHATSAPP_DEFAULT_ENGINE=${WHATSAPP_DEFAULT_ENGINE:-NOWEB}
      - WAHA_CALLBACK_URL=http://wabotii:8000/webhook
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD}
      - WHATSAPP_SWAGGER_USERNAME=${WHATSAPP_SWAGGER_USERNAME}
      - WHATSAPP_SWAGGER_PASSWORD=${WHATSAPP_SWAGGER_PASSWORD}
    volumes:
      - waha-data:/app/sessions
    restart: unless-stopped

volumes:
  waha-data:
